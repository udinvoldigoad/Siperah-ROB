name: CI Frontend

# Sanity check tiap perubahan frontend: dependensi terpasang bersih dari
# lockfile, type-check TypeScript lolos, dan build production tidak error
# (termasuk guard ukuran chunk di vite.config.ts).

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      # 22, bukan 20 — Vite 8 (rolldown) mensyaratkan Node ^20.19.0 || >=22.12.0
      # untuk binding platformnya; "20" berisiko resolve ke patch di bawah
      # 20.19. Dev lokal memakai Node 24, jadi 22 LTS aman di kedua sisi.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # package-lock.json ditulis npm 11.x (dev lokal) — npm bundel Node 22
      # LTS di runner umumnya masih 10.x dan bisa gagal validasi ketat
      # terhadap lockfile berisi banyak optionalDependencies platform
      # (Rolldown, ~15 varian). Samakan versi npm dulu sebelum `ci`.
      - name: Samakan versi npm dengan lockfile
        run: npm install -g npm@11

      # DIAGNOSTIK SEMENTARA: npm ci sudah gagal 2x tanpa pesan error yang
      # terbaca (GitHub tidak menampilkan stdout/stderr publik tanpa token).
      # Tangkap output & cetak sebagai annotation agar bisa dibaca via API
      # publik. Kembalikan ke `run: npm ci` polos setelah akar masalah jelas.
      - name: npm ci
        run: |
          set +e
          npm ci > npm-ci-output.log 2>&1
          status=$?
          cat npm-ci-output.log
          if [ $status -ne 0 ]; then
            ESCAPED=$(sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g' npm-ci-output.log)
            echo "::error::$ESCAPED"
          fi
          exit $status

      - name: Type-check (tsc)
        run: npx tsc -b --noEmit

      - name: Build production
        run: npm run build
