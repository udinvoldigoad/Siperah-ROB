name: CI Frontend

# Sanity check tiap perubahan frontend: dependensi terpasang bersih dari
# lockfile, type-check TypeScript lolos, dan build production tidak error
# (termasuk guard ukuran chunk di vite.config.ts).

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Type-check (tsc)
        run: npx tsc -b --noEmit

      - name: Build production
        run: npm run build
