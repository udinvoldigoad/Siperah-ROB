name: Migrasi DB Produksi

on:
  push:
    branches: [main]
    paths:
      - "backend/database/migrations/**"
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    if: github.repository == 'udinvoldigoad/Siperah-ROB'
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, pgsql
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-migrate-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-migrate-

      - name: Install dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-dev --no-progress

      - name: Run Migrations
        working-directory: backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          DB_DATABASE: ${{ secrets.SUPABASE_DB_DATABASE }}
          DB_USERNAME: ${{ secrets.SUPABASE_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: php artisan migrate --force

      - name: Debug Production Predictions
        working-directory: backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          DB_DATABASE: ${{ secrets.SUPABASE_DB_DATABASE }}
          DB_USERNAME: ${{ secrets.SUPABASE_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          php -r "require 'vendor/autoload.php'; \$app = require_once 'bootstrap/app.php'; \$app->make('Illuminate\Contracts\Console\Kernel')->bootstrap(); \$res = Illuminate\Support\Facades\DB::table('predictions')->selectRaw('prediction_date, AVG(risk_probability) as avg_p, MAX(risk_probability) as max_p, AVG(max_tidal_height) as avg_tide, COUNT(*) as count')->groupBy('prediction_date')->orderBy('prediction_date')->limit(35)->get(); foreach(\$res as \$r) { echo \"Date: \$r->prediction_date, Avg Prob: \$r->avg_p%, Max Prob: \$r->max_p%, Avg Tide: \$r->avg_tide m, Count: \$r->count\n\"; }"