name: Migrasi DB Produksi

on:
  push:
    branches: [main]
    paths:
      - "backend/database/migrations/**"
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    if: github.repository == 'udinvoldigoad/Siperah-ROB'
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, pgsql
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-migrate-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-migrate-

      - name: Install dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-dev --no-progress

      - name: Run Migrations
        working-directory: backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          DB_DATABASE: ${{ secrets.SUPABASE_DB_DATABASE }}
          DB_USERNAME: ${{ secrets.SUPABASE_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: php artisan migrate --force

      - name: Debug Production Tidal Data
        working-directory: backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          DB_DATABASE: ${{ secrets.SUPABASE_DB_DATABASE }}
          DB_USERNAME: ${{ secrets.SUPABASE_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: php -r "require 'vendor/autoload.php'; \$app = require_once 'bootstrap/app.php'; \$app->make('Illuminate\Contracts\Console\Kernel')->bootstrap(); print_r(Illuminate\Support\Facades\DB::table('tidal_data')->selectRaw('MIN(tidal_height) as min_h, MAX(tidal_height) as max_h, COUNT(*) as count')->first());"